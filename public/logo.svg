<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="spiral-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#ffb300" />
    </linearGradient>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#141923" />
      <stop offset="100%" stop-color="#090d16" />
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Dark Background -->
  <rect width="100%" height="100%" rx="112" fill="url(#bg-grad)" stroke="#1a2436" stroke-width="6"/>

  <!-- Glowing Cyber Hexagon Frame -->
  <polygon points="256,48 436,152 436,360 256,464 76,360 76,152" fill="none" stroke="url(#spiral-grad)" stroke-width="4" stroke-opacity="0.3" />
  <polygon points="256,64 420,158 420,354 256,448 92,354 92,158" fill="none" stroke="url(#spiral-grad)" stroke-width="8" filter="url(#glow)" />

  <!-- The Cryptospiral Central Logo -->
  <g transform="translate(256, 256)" filter="url(#glow)">
    <!-- Outer Spiral Path -->
    <path d="M 0,0 
             M -10,-10
             A 30,30 0 1,1 40,0
             A 60,60 0 1,1 -70,-20
             A 90,90 0 1,1 100,40
             A 120,120 0 1,1 -130,-60
             A 150,150 0 1,1 160,80" 
          fill="none" stroke="url(#spiral-grad)" stroke-width="18" stroke-linecap="round" />
          
    <!-- Core Energetic Node -->
    <circle cx="0" cy="0" r="16" fill="#00f0ff" />
  </g>
</svg>
